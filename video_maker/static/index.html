<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Maker — YouTube to Shorts</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: #2a2a3a;
            --text: #e4e4ef;
            --text-dim: #8888a0;
            --accent: #7c3aed;
            --accent-light: #a78bfa;
            --accent-glow: rgba(124, 58, 237, 0.25);
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --blue: #3b82f6;
            --radius: 12px;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { width: 100%; padding: 24px 0 0; text-align: center; }
        header h1 {
            font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(135deg, var(--accent-light), #f472b6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        header p { color: var(--text-dim); font-size: 0.9rem; margin-top: 6px; }

        main {
            width: 100%; max-width: 660px;
            padding: 32px 20px 60px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 24px;
        }

        .input-group { display: flex; gap: 10px; }
        .input-group input {
            flex: 1; padding: 14px 16px; border-radius: var(--radius);
            border: 1px solid var(--border); background: var(--surface2);
            color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s;
        }
        .input-group input::placeholder { color: var(--text-dim); }
        .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

        .btn {
            padding: 14px 28px; border-radius: var(--radius); border: none;
            background: var(--accent); color: #fff; font-size: 0.95rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .btn:hover { background: #6d28d9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ── Preset selector ─────────────────── */
        .preset-row {
            display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap;
        }
        .preset-option {
            flex: 1; min-width: 180px;
            display: flex; flex-direction: column; gap: 4px;
            padding: 12px 14px; border-radius: var(--radius);
            border: 1px solid var(--border); background: var(--surface2);
            cursor: pointer; transition: all 0.2s;
        }
        .preset-option:hover { border-color: var(--accent-light); }
        .preset-option input[type="radio"] { display: none; }
        .preset-option.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
            background: rgba(124, 58, 237, 0.08);
        }
        .preset-title { font-weight: 700; font-size: 0.9rem; color: var(--text); }
        .preset-desc { font-size: 0.75rem; color: var(--text-dim); line-height: 1.35; }

        .music-upload {
            margin-top: 14px; padding: 14px;
            border: 1px dashed var(--border); border-radius: var(--radius);
            background: var(--surface2);
        }
        .music-upload-label {
            display: block; font-size: 0.85rem; color: var(--text-dim);
            margin-bottom: 8px; font-weight: 600;
        }
        .music-upload input[type="file"] {
            font-size: 0.85rem; color: var(--text);
            font-family: inherit; width: 100%;
        }
        .music-upload input[type="file"]::file-selector-button {
            padding: 6px 12px; border-radius: 8px; border: none;
            background: var(--accent); color: #fff; font-weight: 600;
            cursor: pointer; margin-right: 10px;
        }
        .music-status {
            margin-top: 8px; font-size: 0.8rem; color: var(--text-dim);
        }
        .music-status.ok { color: var(--success); }
        .music-status.error { color: var(--error); }

        /* ── Hidden sections ──────────────────── */
        .hidden { display: none !important; }

        /* ── YouTube embed ─────────────────────── */
        .yt-embed {
            width: 100%; aspect-ratio: 16/9; border-radius: var(--radius);
            overflow: hidden; background: #000; margin-bottom: 16px;
        }
        .yt-embed iframe { width: 100%; height: 100%; border: none; }
        .video-title {
            font-size: 0.88rem; color: var(--text-dim); margin-top: 8px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* ── Steps ─────────────────────────────── */
        .steps {
            display: flex; gap: 0; margin-bottom: 20px;
            overflow-x: auto; padding-bottom: 4px;
        }
        .step {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 14px; font-size: 0.8rem; font-weight: 600;
            color: var(--text-dim); white-space: nowrap; position: relative;
        }
        .step::after {
            content: ''; width: 20px; height: 1px; background: var(--border); margin-left: 6px;
        }
        .step:last-child::after { display: none; }
        .step-icon {
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; border: 2px solid var(--border); color: var(--border);
            flex-shrink: 0; transition: all 0.3s;
        }
        .step.active .step-icon {
            border-color: var(--accent-light); color: var(--accent-light);
            box-shadow: 0 0 8px var(--accent-glow);
            animation: pulse-step 1.5s ease-in-out infinite;
        }
        .step.active { color: var(--text); }
        .step.done .step-icon {
            border-color: var(--success); background: var(--success); color: #fff;
        }
        .step.done { color: var(--success); }
        .step.error .step-icon {
            border-color: var(--error); background: var(--error); color: #fff;
        }
        .step.error { color: var(--error); }
        @keyframes pulse-step { 0%,100%{opacity:1}50%{opacity:.5} }

        /* ── Progress ──────────────────────────── */
        .progress-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 8px;
        }
        .progress-label { font-size: 0.88rem; color: var(--text-dim); }
        .progress-pct { font-size: 0.88rem; font-weight: 700; color: var(--accent-light); }
        .timer { font-size: 0.78rem; color: var(--text-dim); margin-left: 12px; }

        .progress-bar-bg {
            width: 100%; height: 6px; border-radius: 3px;
            background: var(--surface2); overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; border-radius: 3px;
            background: linear-gradient(90deg, var(--accent), #f472b6);
            transition: width 0.4s ease; width: 0%;
        }
        .progress-bar-fill.error { background: var(--error); }

        .error-text {
            color: var(--error); font-size: 0.88rem; margin-top: 12px;
            padding: 10px 14px; background: rgba(239,68,68,0.08);
            border-radius: 8px; border: 1px solid rgba(239,68,68,0.2);
        }

        /* ── Results ───────────────────────────── */
        .clips-summary { color: var(--text-dim); font-size: 0.88rem; margin-bottom: 16px; }
        .clips-summary strong { color: var(--text); }

        .clips-grid { display: flex; flex-direction: column; gap: 20px; }

        .clip-card {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px;
        }
        .clip-header {
            display: flex; align-items: center; flex-wrap: wrap;
            gap: 8px; margin-bottom: 12px;
        }
        .clip-title { font-weight: 700; font-size: 0.95rem; }
        .meta-chip {
            padding: 4px 10px; border-radius: 20px; background: var(--surface);
            font-size: 0.75rem; color: var(--text-dim); border: 1px solid var(--border);
        }
        .meta-chip strong { color: var(--text); }
        .clip-hook {
            background: var(--surface); border-left: 3px solid var(--accent);
            padding: 8px 12px; border-radius: 0 6px 6px 0;
            font-size: 0.8rem; color: var(--text-dim); margin-bottom: 12px; font-style: italic;
        }
        .video-container { width: 100%; display: flex; justify-content: center; margin-bottom: 12px; }
        .video-container video {
            max-height: 480px; width: 100%; border-radius: var(--radius);
            background: #000; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .download-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; border-radius: var(--radius);
            background: var(--success); color: #fff; text-decoration: none;
            font-weight: 600; font-size: 0.85rem; transition: all 0.2s;
        }
        .download-btn:hover { background: #059669; transform: translateY(-1px); }

        footer { text-align: center; padding: 20px; color: var(--text-dim); font-size: 0.78rem; }
        footer a { color: var(--accent-light); text-decoration: none; }
    </style>
</head>
<body>

<header>
    <h1>Video Maker</h1>
    <p>YouTube &rarr; TikTok/Reels en un clic</p>
</header>

<main>
    <!-- URL Input + preset selector -->
    <div class="card">
        <div class="input-group">
            <input type="text" id="url-input" placeholder="Colle une URL YouTube ici..." autocomplete="off" />
            <button class="btn" id="submit-btn" onclick="submitVideo()">
                <span id="btn-text">G&eacute;n&eacute;rer</span>
            </button>
        </div>

        <div class="preset-row">
            <label class="preset-option selected" data-preset="default">
                <input type="radio" name="preset" value="default" checked />
                <span class="preset-title">Standard</span>
                <span class="preset-desc">9:16 + recadrage visage + sous-titres TikTok</span>
            </label>
            <label class="preset-option" data-preset="podcast_bw">
                <input type="radio" name="preset" value="podcast_bw" />
                <span class="preset-title">Podcast Noir &amp; Blanc</span>
                <span class="preset-desc">Isolation sujet (RVM) + N&amp;B + musique de fond</span>
            </label>
        </div>

        <div class="music-upload hidden" id="music-upload-section">
            <label class="music-upload-label" for="music-file">Musique de fond (mp3, wav, m4a...)</label>
            <input type="file" id="music-file" accept="audio/*" onchange="onMusicSelected()" />
            <div class="music-status" id="music-status">Aucun fichier s&eacute;lectionn&eacute;</div>
        </div>
    </div>

    <!-- YouTube Preview + Status -->
    <div class="card hidden" id="status-section">
        <!-- YouTube embed -->
        <div class="hidden" id="yt-preview">
            <div class="yt-embed"><iframe id="yt-iframe" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>
            <div class="video-title" id="video-title"></div>
        </div>

        <!-- Step indicators -->
        <div class="steps" id="steps">
            <div class="step" data-step="downloading">
                <span class="step-icon">1</span> T&eacute;l&eacute;chargement
            </div>
            <div class="step" data-step="analyzing">
                <span class="step-icon">2</span> Analyse
            </div>
            <div class="step" data-step="rendering">
                <span class="step-icon">3</span> Rendu
            </div>
            <div class="step" data-step="completed">
                <span class="step-icon">4</span> Termin&eacute;
            </div>
        </div>

        <!-- Progress bar -->
        <div class="progress-row">
            <span class="progress-label" id="progress-text">En attente...</span>
            <span>
                <span class="progress-pct" id="progress-pct">0%</span>
                <span class="timer" id="timer">0:00</span>
            </span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-bar"></div>
        </div>

        <div class="error-text hidden" id="error-text"></div>
    </div>

    <!-- Results -->
    <div class="card hidden" id="result-section">
        <div class="clips-summary" id="clips-summary"></div>
        <div class="clips-grid" id="clips-grid"></div>
    </div>
</main>

<footer>
    Propuls&eacute; par <a href="/api/docs">Video Maker API</a> &middot; FFmpeg &middot; Whisper
</footer>

<script>
const API = '';
let eventSource = null;
let timerInterval = null;
let startTime = null;
let currentJobId = null;
let pollInterval = null;
let sseRetries = 0;
let uploadedMusicId = null;
let uploadedMusicName = null;
const MAX_SSE_RETRIES = 20;

const $ = id => document.getElementById(id);

const STEP_ORDER = ['downloading', 'analyzing', 'rendering', 'completed'];

// ── Preset selector ───────────────────────────────────────────────
function getCurrentPreset() {
    const checked = document.querySelector('input[name="preset"]:checked');
    return checked ? checked.value : 'default';
}

function refreshPresetUI() {
    const preset = getCurrentPreset();
    document.querySelectorAll('.preset-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.preset === preset);
    });
    const showMusic = preset === 'podcast_bw';
    $('music-upload-section').classList.toggle('hidden', !showMusic);
}

document.querySelectorAll('input[name="preset"]').forEach(el => {
    el.addEventListener('change', refreshPresetUI);
});

async function onMusicSelected() {
    const fileEl = $('music-file');
    const status = $('music-status');
    if (!fileEl.files || !fileEl.files[0]) {
        uploadedMusicId = null;
        uploadedMusicName = null;
        status.textContent = 'Aucun fichier s\u00e9lectionn\u00e9';
        status.className = 'music-status';
        return;
    }
    const file = fileEl.files[0];
    status.textContent = `T\u00e9l\u00e9versement de "${file.name}"...`;
    status.className = 'music-status';
    uploadedMusicId = null;

    const formData = new FormData();
    formData.append('file', file);
    try {
        const resp = await fetch(`${API}/api/upload-music`, { method: 'POST', body: formData });
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.detail || `Upload failed (${resp.status})`);
        }
        const data = await resp.json();
        uploadedMusicId = data.music_id;
        uploadedMusicName = data.filename;
        const sizeMb = (data.size_bytes / 1024 / 1024).toFixed(2);
        status.textContent = `\u2713 ${data.filename} (${sizeMb} MB) pr\u00eat`;
        status.className = 'music-status ok';
    } catch (e) {
        uploadedMusicId = null;
        status.textContent = `\u00c9chec : ${e.message}`;
        status.className = 'music-status error';
    }
}

function extractVideoId(url) {
    const m = url.match(/(?:v=|\/v\/|youtu\.be\/|\/shorts\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
}

function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    return `${m}:${String(s % 60).padStart(2, '0')}`;
}

function saveJob(jobId, videoUrl) {
    localStorage.setItem('vm_job', JSON.stringify({
        jobId, videoUrl, startTime: startTime || Date.now()
    }));
}

function clearJob() {
    localStorage.removeItem('vm_job');
    currentJobId = null;
}

function startTimer(from) {
    startTime = from || Date.now();
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        $('timer').textContent = formatTime(Date.now() - startTime);
    }, 1000);
}

function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function stopPolling() {
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

function closeSSE() {
    if (eventSource) { eventSource.close(); eventSource = null; }
}

function updateSteps(currentStatus) {
    const steps = document.querySelectorAll('.step');
    const currentIdx = STEP_ORDER.indexOf(currentStatus);

    steps.forEach((el, i) => {
        el.classList.remove('active', 'done', 'error');
        if (currentStatus === 'failed') {
            if (i <= currentIdx || i === 0) el.classList.add('error');
        } else if (i < currentIdx) {
            el.classList.add('done');
            el.querySelector('.step-icon').textContent = '\u2713';
        } else if (i === currentIdx) {
            el.classList.add(currentStatus === 'completed' ? 'done' : 'active');
            if (currentStatus === 'completed') el.querySelector('.step-icon').textContent = '\u2713';
        }
    });
}

function showStatusUI() {
    $('status-section').classList.remove('hidden');
    $('result-section').classList.add('hidden');
    $('error-text').classList.add('hidden');
    $('progress-bar').classList.remove('error');
}

async function submitVideo() {
    const url = $('url-input').value.trim();
    if (!url) { $('url-input').focus(); return; }

    // Reset UI
    _renderedClipCount = 0;
    $('clips-grid').innerHTML = '';
    $('submit-btn').disabled = true;
    $('btn-text').textContent = 'Traitement...';
    showStatusUI();
    $('progress-bar').style.width = '0%';
    $('progress-pct').textContent = '0%';
    $('progress-text').textContent = 'Envoi...';
    $('video-title').textContent = '';

    // Reset steps
    document.querySelectorAll('.step').forEach((el, i) => {
        el.classList.remove('active', 'done', 'error');
        el.querySelector('.step-icon').textContent = String(i + 1);
    });

    // Show YouTube embed immediately
    const videoId = extractVideoId(url);
    if (videoId) {
        $('yt-iframe').src = `https://www.youtube.com/embed/${videoId}`;
        $('yt-preview').classList.remove('hidden');
    } else {
        $('yt-preview').classList.add('hidden');
    }

    startTimer();

    const preset = getCurrentPreset();
    if (preset === 'podcast_bw' && !uploadedMusicId) {
        const proceed = confirm(
            "Aucune musique n'a \u00e9t\u00e9 t\u00e9l\u00e9vers\u00e9e.\n"
            + "Le clip sera g\u00e9n\u00e9r\u00e9 avec uniquement la voix du podcast.\n\n"
            + "Continuer quand m\u00eame ?"
        );
        if (!proceed) {
            stopTimer();
            resetBtn();
            return;
        }
    }

    const body = { youtube_url: url, render_preset: preset };
    if (preset === 'podcast_bw' && uploadedMusicId) {
        body.music_id = uploadedMusicId;
    }

    try {
        const resp = await fetch(`${API}/api/process`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        if (!resp.ok) {
            const err = await resp.json();
            throw new Error(err.detail || 'Erreur serveur');
        }
        const data = await resp.json();
        currentJobId = data.job_id;
        saveJob(data.job_id, url);
        connectSSE(data.job_id);
    } catch (e) {
        showError(e.message);
        resetBtn();
        stopTimer();
    }
}

function connectSSE(jobId) {
    closeSSE();
    stopPolling();
    sseRetries = 0;
    _openSSE(jobId);
}

function _openSSE(jobId) {
    closeSSE();
    eventSource = new EventSource(`${API}/api/events/${jobId}`);

    eventSource.onmessage = (event) => {
        sseRetries = 0;  // reset on successful message
        const data = JSON.parse(event.data);
        handleUpdate(data);
    };

    eventSource.onerror = () => {
        closeSSE();
        sseRetries++;
        if (sseRetries <= MAX_SSE_RETRIES) {
            // Exponential backoff: 1s, 2s, 4s, ... capped at 10s
            const delay = Math.min(1000 * Math.pow(2, sseRetries - 1), 10000);
            console.log(`SSE disconnected, retry ${sseRetries}/${MAX_SSE_RETRIES} in ${delay}ms`);
            setTimeout(() => _openSSE(jobId), delay);
        } else {
            // SSE failed too many times — fall back to polling
            console.log('SSE failed, switching to polling');
            startPolling(jobId);
        }
    };
}

function startPolling(jobId) {
    stopPolling();
    pollInterval = setInterval(async () => {
        try {
            const resp = await fetch(`${API}/api/status/${jobId}`);
            if (!resp.ok) { stopPolling(); return; }
            const data = await resp.json();
            handleUpdate(data);
            if (data.status === 'completed' || data.status === 'failed') {
                stopPolling();
            }
        } catch (e) {
            console.warn('Poll error:', e);
        }
    }, 2000);
}

function handleUpdate(data) {
    // Progress bar + percentage
    const pct = data.percent || 0;
    $('progress-bar').style.width = pct + '%';
    $('progress-pct').textContent = pct + '%';
    $('progress-text').textContent = data.progress || '';

    // Video title
    if (data.video_title) {
        $('video-title').textContent = data.video_title;
    }

    // YouTube embed (in case of restore)
    if (data.video_id && $('yt-iframe').src.indexOf(data.video_id) === -1) {
        $('yt-iframe').src = `https://www.youtube.com/embed/${data.video_id}`;
        $('yt-preview').classList.remove('hidden');
    }

    // Steps
    updateSteps(data.status);

    // Show clips progressively as they are rendered
    if (data.clips && data.clips.length > 0) {
        showResult(data);
    }

    // Terminal states
    if (data.status === 'completed') {
        stopTimer();
        closeSSE();
        stopPolling();
        clearJob();
        resetBtn();
        showResult(data);
    }

    if (data.status === 'failed') {
        stopTimer();
        closeSSE();
        stopPolling();
        clearJob();
        $('progress-bar').classList.add('error');
        showError(data.error || 'Le traitement a \u00e9chou\u00e9');
        resetBtn();
    }
}

function showError(msg) {
    $('error-text').textContent = msg;
    $('error-text').classList.remove('hidden');
}

let _renderedClipCount = 0;

function showResult(data) {
    if (!data.clips || !data.clips.length) return;

    const totalDur = data.clips.reduce((s, c) => s + c.duration, 0);
    const elapsed = startTime ? formatTime(Date.now() - startTime) : '';
    const label = data.status === 'completed' ? 'g\u00e9n\u00e9r\u00e9s' : 'en cours...';
    $('clips-summary').innerHTML =
        `<strong>${data.clips.length}</strong> clips ${label} &middot; ${Math.round(totalDur)}s au total` +
        (elapsed ? ` &middot; <span style="color:var(--success)">${elapsed}</span>` : '');

    const grid = $('clips-grid');

    // Only append new clips (don't rebuild existing ones — avoids resetting video players)
    for (let i = _renderedClipCount; i < data.clips.length; i++) {
        const clip = data.clips[i];
        const videoUrl = `${API}${clip.download_link}`;
        const card = document.createElement('div');
        card.className = 'clip-card';
        card.innerHTML = `
            <div class="clip-header">
                <span class="clip-title">${clip.title || ('Clip #' + (i+1))}</span>
                <span class="meta-chip"><strong>${clip.duration}s</strong></span>
                <span class="meta-chip">Score: <strong>${clip.virality_score}/10</strong></span>
            </div>
            ${clip.hook_reason ? `<div class="clip-hook">${clip.hook_reason}</div>` : ''}
            <div class="video-container">
                <video controls playsinline preload="metadata" src="${videoUrl}"></video>
            </div>
            <a class="download-btn" href="${videoUrl}" download>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                T\u00e9l\u00e9charger
            </a>
        `;
        grid.appendChild(card);
    }
    _renderedClipCount = data.clips.length;

    $('result-section').classList.remove('hidden');
}

function resetBtn() {
    $('submit-btn').disabled = false;
    $('btn-text').textContent = 'G\u00e9n\u00e9rer';
}

// ── Restore in-progress job on page load ──────────────────────────
async function restoreJob() {
    const saved = localStorage.getItem('vm_job');
    if (!saved) return;

    try {
        const { jobId, videoUrl, startTime: savedStart } = JSON.parse(saved);
        // Check if job still exists on the server
        const resp = await fetch(`${API}/api/status/${jobId}`);
        if (!resp.ok) { clearJob(); return; }

        const data = await resp.json();

        // Job already finished — show result or error, then clear
        if (data.status === 'completed' || data.status === 'failed') {
            showStatusUI();
            startTimer(savedStart);
            handleUpdate(data);
            return;
        }

        // Job still running — restore UI and reconnect
        currentJobId = jobId;
        $('submit-btn').disabled = true;
        $('btn-text').textContent = 'Traitement...';
        showStatusUI();

        // Restore YouTube embed
        const videoId = data.video_id || extractVideoId(videoUrl || '');
        if (videoId) {
            $('yt-iframe').src = `https://www.youtube.com/embed/${videoId}`;
            $('yt-preview').classList.remove('hidden');
        }

        startTimer(savedStart);
        handleUpdate(data);  // apply current state immediately
        connectSSE(jobId);   // reconnect for live updates
    } catch (e) {
        console.warn('Failed to restore job:', e);
        clearJob();
    }
}

$('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitVideo(); });
refreshPresetUI();
restoreJob();
</script>
